site_name: OpenCSTL
site_description: Open Source C Container Library like STL in C++
site_url: https://springkim.github.io/OpenCSTL/
repo_name: springkim/OpenCSTL
repo_url: https://github.com/springkim/OpenCSTL
edit_uri: edit/master/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - toc.follow
  font:
    text: Noto Sans
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang:
        - en
        - ko

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
      title: On this page

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/springkim/OpenCSTL
  alternate:
    - name: English
      link: /OpenCSTL/
      lang: en
    - name: 한국어
      link: /OpenCSTL/ko/
      lang: ko
    - name: 中文
      link: /OpenCSTL/zh/
      lang: zh

nav:
  - Home: index.md
  - Containers Library: _containers.md
  - Sequence Containers:
    - VECTOR: __vector.md
    - LIST: __list.md
    - DEQUE: __deque.md
  - Associative Containers:
    - SET: __set.md
    - MAP: __map.md
  - Unordered Containers:
    - UNORDERED_SET: __unordered_set.md
    - UNORDERED_MAP: __unordered_map.md
  - Container Adaptors:
    - STACK: __stack.md
    - QUEUE: __queue.md
    - PRIORITY_QUEUE: __priority_queue.md
